name: "matrix"

# Matrix homeserver stack for chat.example.com
# SSL is handled by your external reverse proxy.
# All services listen on localhost only -- keep behind Tailscale.
#
# Ports to expose via reverse proxy:
#   Synapse (Matrix API):  http://localhost:8008  -> https://chat.example.com
#   Element (web client):  http://localhost:8009  -> https://element.example.com (optional)
#
# First-run: generate the Synapse config before starting:
#   docker compose run --rm synapse generate

services:

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: synapse
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_db_password}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - ./postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse"]
      interval: 10s
      timeout: 5s
      retries: 5

  synapse:
    image: matrixdotorg/synapse:latest
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./synapse-data:/data
      - ./media:/data/media_store
    ports:
      - "0.0.0.0:8008:8008"     # Matrix client API -- reverse proxy here
    healthcheck:
      test: ["CMD-SHELL", "curl -fSs http://localhost:8008/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  element:
    image: vectorim/element-web:latest
    restart: unless-stopped
    sysctls:
      - net.ipv4.ip_unprivileged_port_start=80
    volumes:
      - ./element/config.json:/app/config.json:ro
    ports:
      - "127.0.0.1:8009:80"     # Element web UI -- optional, reverse proxy here

volumes:
  postgres-data:
  synapse-data:
  media:
